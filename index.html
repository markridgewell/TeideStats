<!DOCTYPE html>
<html>

<body>
    <h1>Hello!</h1>
    <div id="div">
        <canvas id="chart"></canvas>
    </div>
    <div id="commit-list"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="./functions.js" type="text/javascript"></script>

    <script type="text/javascript">
        function buildChart(data) {
            let node = document.getElementById('commit-list');
            let ul = document.createElement('ul');

            let durationThreshold_s = 60 * 60

            commitHashes = data.commits.filter((commit) => commit.build_time_s <= durationThreshold_s).map((commit) => commit.hash);
            chart = new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels: commitHashes,
                    datasets: [{
                        label: 'Total duration',
                        data: Array(data.commits.length).fill(undefined)
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            ticks: {
                                display: false
                            }
                        },
                        y: {
                            type: 'time',
                            time: {
                                unit: 'minute',
                                displayFormats: {
                                    minute: 'm:ss',
                                }
                            }
                        },
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    }
                }
            });

            data.commits.forEach(commit => {
                duration_ms = commit.build_time_s * 1000

                let li = document.createElement('li');
                {
                    let a = document.createElement('a');
                    {
                        a.id = commit.hash;
                        a.href = 'run.html?commit=' + commit.hash;
                        a.appendChild(document.createTextNode(commit.hash.slice(0, 8)));
                        a.appendChild(document.createTextNode(' ' + commit.display_title));
                    }

                    li.appendChild(a);
                    li.appendChild(document.createTextNode(' (' + asMinutesSeconds(duration_ms) + ')'));
                }
                ul.appendChild(li);

                const index = commitHashes.indexOf(commit.hash);
                chart.data.datasets[0].data[index] = duration_ms;
                chart.update();
            });
            node.appendChild(ul);
        }

        fetchJson("./commits.json").then(buildChart);
    </script>
</body>

</html>
